<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Admin local - Editor</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:16px}
    textarea{width:100%;height:60vh;font-family:monospace}
    button{padding:8px 12px;margin-top:8px}
  </style>
</head>
<body>
  <h1>Editor local</h1>
  <p>Edita el contenido HTML del <strong>body</strong>. Guarda para aplicar los cambios al archivo.</p>
  <textarea id="editor"></textarea>
  <div>
    <button id="save">Guardar</button>
    <button id="reload">Recargar</button>
    <span id="status" style="margin-left:12px"></span>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');

    async function load() {
      status.textContent = 'Cargando...';
      const res = await fetch('/api/content');
      const json = await res.json();
      editor.value = json.body || '';
      status.textContent = '';
    }

    document.getElementById('save').addEventListener('click', async () => {
      status.textContent = 'Guardando...';
      const body = editor.value;
      const res = await fetch('/api/save', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ body })
      });
      const json = await res.json();
      status.textContent = json.ok ? 'Guardado.' : ('Error: ' + (json.error||''));
    });

    document.getElementById('reload').addEventListener('click', load);

    load();
  </script>
</body>
</html>
